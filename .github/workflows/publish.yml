name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
  push:
    tags:
      - "sdk-python-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      publish_target: ${{ steps.choose-target.outputs.publish_target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: choose-target
        name: Resolve publish target
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "publish_target=pypi" >> "$GITHUB_OUTPUT"
          else
            echo "publish_target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build artifacts
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    if: needs.build.outputs.publish_target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    if: needs.build.outputs.publish_target == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
